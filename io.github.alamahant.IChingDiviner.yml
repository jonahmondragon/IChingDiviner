app-id: io.github.alamahant.IChingDiviner
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: IChingDiviner
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
modules:
  - name: IChingDiviner
    buildsystem: cmake-ninja
    config-opts:
      - -DFLATPAK_BUILD=ON
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/alamahant/IChingDiviner.git
        tag: v1.0.0
        commit: 19b1d45f6642210ae6c5b1d971fe1ecfdcd9c0e0
      
